<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>PoE2 工具箱 · 设置</title>
    <style>
        :root {
            --bg: #16161c;
            --bg2: #1d1d26;
            --line: #2c2c38;
            --gold: #c9aa71;
            --gold2: #e8c987;
            --text: #e8e3d6;
            --dim: #9a958a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }

        .wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: 32px 24px 64px;
        }

        h1 {
            font-size: 20px;
            color: var(--gold2);
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 24px;
        }

        .logo {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--gold2), var(--gold));
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        section {
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 18px;
        }

        h2 {
            font-size: 15px;
            margin: 0 0 14px;
            color: var(--gold2);
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
        }

        .row:last-child {
            border-bottom: none;
        }

        .row .name {
            font-weight: 600;
        }

        .row .desc {
            color: var(--dim);
            font-size: 12px;
        }

        .switch-group {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .switch-label {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--dim);
            font-size: 12px;
        }

        /* toggle */
        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex: none;
        }

        .switch input {
            display: none;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: var(--line);
            border-radius: 24px;
            cursor: pointer;
            transition: .2s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: #fff;
            border-radius: 50%;
            transition: .2s;
        }

        .switch input:checked+.slider {
            background: var(--gold);
        }

        .switch input:checked+.slider::before {
            transform: translateX(20px);
        }

        button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--line);
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
        }

        button.primary {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            border-color: var(--gold);
            color: #1a1a1a;
            font-weight: 600;
        }

        button:hover {
            filter: brightness(1.08);
        }

        .dict-status {
            color: var(--dim);
            font-size: 13px;
            margin-bottom: 12px;
        }

        .dict-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        textarea {
            width: 100%;
            height: 90px;
            margin-top: 12px;
            background: var(--bg);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            box-sizing: border-box;
            display: none;
        }

        .hint {
            color: var(--dim);
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1><span class="logo">⚖</span>PoE2 工具箱 · 设置</h1>

        <section>
            <h2>功能开关</h2>
            <div id="feature-list"></div>
            <p class="hint">关闭后该功能不再注入到集市页面（需刷新页面生效）。</p>
            <p class="hint" style="color: var(--gold2);">⚠ 国际服（pathofexile.com）功能未经过充分测试，不保证可用；默认全部关闭，如需使用请手动开启。</p>
        </section>

        <section>
            <h2>PoB 词典</h2>
            <div class="dict-status" id="dict-status">读取中…</div>
            <div class="dict-actions">
                <button class="primary" id="dict-refresh">立即更新词典</button>
                <button id="dict-import-toggle">手动导入</button>
            </div>
            <textarea id="dict-import-text"
                placeholder="粘贴 lang-sc.json 原料（英文→中文 翻译表）的完整 JSON 内容，然后点「确认导入」"></textarea>
            <div class="dict-actions" id="dict-import-actions" style="display:none; margin-top:10px;">
                <button class="primary" id="dict-import-confirm">确认导入</button>
            </div>
            <p class="hint">词典用于「复制PoB」把中文词缀翻译回英文。首次使用会从远程下载原料（约 5.7MB）并在本地建表缓存。</p>
        </section>
    </div>
    <script src="options.js"></script>
</body>

</html>
